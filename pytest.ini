[pytest]
minversion = 7.0
addopts = -ra -q --strict-markers --tb=short
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    external: marks tests that require external services/network access
    unit: marks tests as unit tests
    asyncio: marks tests as async tests
    benchmark: marks tests as performance benchmarks

# Profile Matrix (deterministic local/CI usage):
#   offline     -> pytest -m "not integration and not external"
#   integration -> pytest -m "integration and not external"
#   external    -> pytest -m "external"
#
# Recommended CI split:
#   1) Offline gate (required):     pytest -m "not integration and not external"
#   2) Integration gate (optional): pytest -m "integration and not external"
#   3) External monitor (optional): pytest -m "external"
